name: Tests

on:
  workflow_dispatch:
  push:
    branches-ignore: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate shell scripts
        run: |
          bash -n src/*.sh
          bash -n scripts/*.sh
          bash -n tests/*.sh

      - name: Run shell tests
        run: |
          bash tests/test_restore_snapshot.sh
          bash tests/test_bootstrap_workspace.sh
          bash tests/test_bootstrap_ltx23.sh

      - name: Validate JSON files
        run: |
          python3 -m json.tool .runpod/hub.json >/dev/null
          python3 -m json.tool .runpod/tests_.json >/dev/null
          python3 -m json.tool package.json >/dev/null
          python3 -m json.tool test_input.json >/dev/null

      - name: Validate GitHub Actions workflow syntax
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].sort.each { |p| YAML.load_file(p); puts "OK #{p}" }'

      - name: Validate Python syntax
        run: |
          python3 -m compileall handler.py src

      - name: Validate Docker bake targets
        run: |
          docker buildx bake --print base >/dev/null
          docker buildx bake --print ltx2-3-distilled >/dev/null
          docker buildx bake --print ltx2-3-distilled-cuda13 >/dev/null
